<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>Library</title>
</head>
<body>
    <div class="card-container">
        <div class="card">
            <h2>The Hobbit</h2>
            <p>Author: J.R.R. Tolkien</p>
            <p>Length: 243 pages</p>
            <p>Read</p>
        </div>
        <div class="card">
            <h2>Game of Thrones</h2>
            <p>Author: G.R.R. Martin</p>
            <p>Length: 337 pages</p>
            <p>Unread</p>
        </div>
        <div class="card">
            <h2>The Great Gatsby</h2>
            <p>Author: F. Scots Fitzgerald</p>
            <p>Length: 130 pages</p>
            <p>Unread</p>
        </div>
    </div>
</body>
</html>
